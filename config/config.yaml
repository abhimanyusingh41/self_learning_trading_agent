# Trading Mode: paper | live | backtest
trading_mode: paper

kite:
  api_key: ${KITE_API_KEY}
  api_secret: ${KITE_API_SECRET}
  access_token: ${KITE_ACCESS_TOKEN}

binance:
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_API_SECRET}
  testnet: true   # set to false for real Binance trading

risk:
  daily_loss_limit_pct: 2.0
  per_trade_loss_pct: 0.5
  max_positions: 6          # increased for multi-asset
  max_trade_value_pct: 10.0
  kill_switch: false
  initial_capital: 100000

instruments:
  # Indian equities (NSE)
  equities:
    - RELIANCE
    - TCS
    - HDFCBANK
    - INFY
    - ICICIBANK
    - SBIN
    - BHARTIARTL
    - BAJFINANCE
    - KOTAKBANK
    - AXISBANK
  exchange: NSE

  # Indian commodities (MCX)
  commodities:
    - GOLD
    - GOLDM
    - SILVER
    - SILVERM
  commodity_exchange: MCX

  # Crypto (Binance — USDT pairs)
  crypto:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT

agent:
  model: claude-opus-4-7
  max_tokens: 8192
  analysis_interval_minutes: 15
  reflection_enabled: true
  memory_file: data/memory/trade_memory.json

market:
  timezone: Asia/Kolkata
  # NSE equity hours
  equity_open: "09:15"
  equity_close: "15:30"
  # MCX commodity hours
  commodity_open: "09:00"
  commodity_close: "23:30"
  # Crypto: 24x7

backtest:
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  interval: "5minute"

logging:
  level: INFO
  file: logs/trading_agent.log
