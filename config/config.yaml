# Trading Mode: paper | live | backtest
trading_mode: paper

kite:
  api_key: ${KITE_API_KEY}
  api_secret: ${KITE_API_SECRET}
  access_token: ${KITE_ACCESS_TOKEN}

binance:
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_API_SECRET}
  testnet: false  # uses real price feed; paper trading = no real orders placed

risk:
  daily_loss_limit_pct: 2.0
  per_trade_loss_pct: 0.5        # equity/commodity/crypto: % of capital at risk per trade
  options_per_trade_loss_pct: 3.0  # options: higher tolerance (premium × SL% × lot_size)
  max_positions: 3               # max concurrent open trades across all pools
  max_trade_value_pct: 10.0
  options_max_trade_value: 30000  # absolute INR cap per option trade (premium × lot_size × lots)
  options_max_lots: 2            # hard cap on lots per option trade
  kill_switch: false
  # Separate capital pools — each segment trades its own allocation independently
  nse_capital: 50000        # INR for NSE options (NFO)
  mcx_capital: 50000        # INR for MCX commodities
  crypto_capital_usdt: 500  # USDT for Binance crypto

instruments:
  # All Nifty 50 stocks for option trading (actual trades go to NFO segment)
  # No lot_size here — fetched live from Kite at both display and trade time
  option_underlyings:
    - RELIANCE
    - TCS
    - HDFCBANK
    - INFY
    - ICICIBANK
    - SBIN
    - BHARTIARTL
    - BAJFINANCE
    - KOTAKBANK
    - AXISBANK
    - LT
    - HCLTECH
    - WIPRO
    - MARUTI
    - SUNPHARMA
    - TITAN
    - ULTRACEMCO
    - TATAMOTORS
    - TATASTEEL
    - TATACONSUM
    - JSWSTEEL
    - ADANIENT
    - ADANIPORTS
    - BAJAJFINSV
    - BAJAJ-AUTO
    - HEROMOTOCO
    - EICHERMOT
    - M&M
    - CIPLA
    - DIVISLAB
    - DRREDDY
    - APOLLOHOSP
    - ASIANPAINT
    - BRITANNIA
    - NESTLEIND
    - HINDUNILVR
    - ITC
    - ONGC
    - COALINDIA
    - BPCL
    - NTPC
    - POWERGRID
    - GRASIM
    - INDUSINDBK
    - HDFCLIFE
    - SBILIFE
    - SHRIRAMFIN
    - TECHM
    - TRENT
    - BEL
  exchange: NSE
  options_exchange: NFO

  # Indian commodities (MCX)
  commodities:
    - GOLD
    - GOLDM
    - GOLDPETAL
    - SILVER
    - SILVERM
    - SILVERMIC
  commodity_exchange: MCX

  # Crypto (Binance — USDT pairs)
  crypto:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - DOGEUSDT
    - AAVEUSDT

agent:
  model: claude-sonnet-4-6
  max_tokens: 4000
  analysis_interval_minutes: 10    # interval when hunting for a trade
  in_trade_interval_minutes: 3     # interval when any position is open
  enable_mcx: false                # paused — code intact, set true to re-enable
  enable_crypto: false             # paused — code intact, set true to re-enable
  reflection_enabled: true
  memory_file: data/memory/trade_memory.json

market:
  timezone: Asia/Kolkata
  # NSE equity hours
  equity_open: "09:15"
  equity_close: "15:30"
  # MCX commodity hours
  commodity_open: "09:00"
  commodity_close: "23:30"
  # Crypto: 24x7

backtest:
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  interval: "5minute"

logging:
  level: INFO
  file: logs/trading_agent.log
