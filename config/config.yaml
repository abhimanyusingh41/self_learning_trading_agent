# Trading Mode: paper | live | backtest
trading_mode: paper

kite:
  api_key: ${KITE_API_KEY}
  api_secret: ${KITE_API_SECRET}
  access_token: ${KITE_ACCESS_TOKEN}

binance:
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_API_SECRET}
  testnet: false  # uses real price feed; paper trading = no real orders placed

risk:
  daily_loss_limit_pct: 2.0
  per_trade_loss_pct: 0.5        # equity/commodity/crypto: % of capital at risk per trade
  options_per_trade_loss_pct: 3.0  # options: higher tolerance (premium × SL% × lot_size)
  max_positions: 6
  max_trade_value_pct: 10.0
  options_max_trade_value_pct: 15.0  # allow slightly larger option premium outlays
  kill_switch: false
  # Separate capital pools — each segment trades its own allocation independently
  nse_capital: 50000        # INR for NSE options (NFO)
  mcx_capital: 50000        # INR for MCX commodities
  crypto_capital_usdt: 500  # USDT for Binance crypto

instruments:
  # Underlying stocks for option trading (actual trades go to NFO segment)
  option_underlyings:
    - symbol: RELIANCE
      lot_size: 250
    - symbol: TCS
      lot_size: 175
    - symbol: HDFCBANK
      lot_size: 550
    - symbol: INFY
      lot_size: 400
    - symbol: ICICIBANK
      lot_size: 700
    - symbol: SBIN
      lot_size: 1500
    - symbol: BHARTIARTL
      lot_size: 1850
    - symbol: BAJFINANCE
      lot_size: 125
    - symbol: KOTAKBANK
      lot_size: 400
    - symbol: AXISBANK
      lot_size: 625
  exchange: NSE
  options_exchange: NFO

  # Indian commodities (MCX)
  commodities:
    - GOLD
    - GOLDM
    - GOLDPETAL
    - SILVER
    - SILVERM
    - SILVERMIC
  commodity_exchange: MCX

  # Crypto (Binance — USDT pairs)
  crypto:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT

agent:
  model: claude-opus-4-7
  max_tokens: 8192
  analysis_interval_minutes: 10
  reflection_enabled: true
  memory_file: data/memory/trade_memory.json

market:
  timezone: Asia/Kolkata
  # NSE equity hours
  equity_open: "09:15"
  equity_close: "15:30"
  # MCX commodity hours
  commodity_open: "09:00"
  commodity_close: "23:30"
  # Crypto: 24x7

backtest:
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  interval: "5minute"

logging:
  level: INFO
  file: logs/trading_agent.log
